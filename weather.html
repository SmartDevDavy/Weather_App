<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Weather</title>
    <link rel="stylesheet" href="wether.css">
</head>
<body>
    
<!--
    
    
    -->
    <div class="container">
        <div class="header">
  <h1>UNIVERSAL WEATHER</h1>
  <div class="mode">
  <button class="light">Light Mode</button>
  <button class="dark">Dark Mode</button>
  </div>
        </div>
        <h1 class="city"></h1>
      
        <div class="search">
        <input type="text" id="loc">
        <label for="loc"><button class="btn">SEARCH</button></label>
    </div>
<div class="time"></div>

    <div class="results">
        <div class="temp cube"></div>
        <div class="condition cube"></div>
        <div class="wind cube"></div>
        <div class="humidity cube"></div>
    </div>
    </div>


<script src="weather.js"></script>
</body>
</html>
